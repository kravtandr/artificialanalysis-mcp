name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Generated API types are in sync with OpenAPI spec
        run: |
          npm run generate:types
          git diff --exit-code src/api/types.gen.ts

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Smoke-test MCP handshake (stdio)
        run: npm run smoke
        env:
          ARTIFICIAL_ANALYSIS_API_KEY: smoke-test-dummy-key

  docker:
    name: Docker build (no push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          # Запись кэша — только из push в main: PR из форков писать в GHA cache не могут
          cache-to: ${{ github.event_name == 'push' && 'type=gha,mode=max' || '' }}
